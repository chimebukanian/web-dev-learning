<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>13 August Page</title>
  <link rel="stylesheet" href="13august.css" />
</head>
<body>
  <div class="logo">
    <img src="https://img.icons8.com/fluency/48/whatsapp.png" alt="WhatsApp logo" />
    <h2>WhatsApp</h2>
  </div>

  <div class="wrapper">
    <div class="whats_windows">
      <div class="main_component">
        <h4>Welcome to the WhatsApp style layout</h4>
        <input type="text" placeholder="Enter your name" />
        <br />
        <input type="email" placeholder="Enter your email" />
        <br />
        <button class="btn">Submit</button>
        <br />
        <a href="#">Forgot password?</a>
      </div>

      <div class="main_component">
        <h4>Quick access</h4>
        <button class="btn_1">Login</button>
        <br /><br />
        <button class="btn_1 right_button">Sign Up</button>
        <br /><br />
        <span class="h_line"></span>
        <div class="right">
          <a href="#">Help</a>
          <a href="#" class="Angular">Support</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
