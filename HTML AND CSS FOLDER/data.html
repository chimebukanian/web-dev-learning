<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data-Attributes</title>
    <style>
        [data-name] {
            border: 1px solid red
        }
    </style>
</head>
<body>
    <!--ability to create my own attribute-->
    <div title="my div title" data-name="Aptech" data-first-name="lekki">
        a normal random div
    </div>
</body>
</html>
