<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Practices</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 2rem;
            line-height: 1.6;
        }
        section {
            margin-bottom: 2rem;
        }
        pre {
            background: #f4f4f4;
            padding: 1rem;
            border-radius: 6px;
            overflow-x: auto;
        }
        button {
            margin-top: 0.5rem;
            padding: 0.5rem 1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>JavaScript Array Practice Exercises</h1>

    <section>
        <h2>1. Armstrong Number Checker</h2>
        <label for="armstrongInput">Enter a number:</label>
        <input type="number" id="armstrongInput" placeholder="e.g. 153">
        <button id="checkArmstrongBtn">Check Armstrong</button>
        <p id="armstrongResult"></p>
    </section>

    <section>
        <h2>2. Student Names Array</h2>
        <button id="displayStudentsBtn">Display Sorted Student Names</button>
        <p id="studentsResult"></p>
        <pre id="studentsList"></pre>
    </section>

    <section>
        <h2>3. Matrix Transpose</h2>
        <button id="transposeMatrixBtn">Show Transpose</button>
        <div id="matrixResult"></div>
    </section>

    <section>
        <h2>4. Pattern Display</h2>
        <button id="showPatternBtn">Show Pattern</button>
        <pre id="patternResult"></pre>
    </section>

    <script src="array_practices.js"></script>
</body>
</html>
