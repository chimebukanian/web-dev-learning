<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Effect</title>
    <style>
        div {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 10px;
            box-shadow:  5px 5px 10px 10px rgba(0, 0, 0, 0.3);;
        }
    </style>
</head>
<body>
    <h2> Shadow Effects </h2>

    <div>
        <figure>
            <img src="../workplace.jpg" width="200" height="200"/>
            <figcaption>workplace laptop</figcaption>
        </figure>
    </div>
</body>
</html>
