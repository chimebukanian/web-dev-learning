<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fade Label Demo</title>
    <style>
        body { font-family: Arial, sans-serif; background: #eef2ff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 32px; border-radius: 18px; box-shadow: 0 8px 32px rgba(0,0,0,.08); text-align: center; }
        .label { font-size: 1.35rem; margin-bottom: 24px; transition: opacity 0.4s ease; }
        .label.hidden { opacity: 0; visibility: hidden; }
        button { border: none; background: #6366f1; color: white; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #4f46e5; }
    </style>
</head>
<body>
    <div class="container">
        <div id="fadeLabel" class="label">Click the button to hide or show this text.</div>
        <button id="fadeButton" name="fade">Fade</button>
    </div>
    <script src="fade_label.js"></script>
</body>
</html>
