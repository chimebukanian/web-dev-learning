<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-1.11.1.min.js"></script>
</head>
<body>
<nav></nav>
    <h2>Jquery Explained</h2>
    <div id="myDiv"> $() is the main jquery function</div>
    <div> jquery should only run when document is fully loaded</div>
    <button>Click to fade toggle</button>

    <script>
        // $() is the main jquery function
        // jquery should only run when document is fully loaded
        $('document').ready(function() {

            $('button').click(function() {
                $('h2').fadeToggle('slow')
            })
            
            // dom events
            $('#myDiv').dblclick(function() {
                console.log("dbl clicked!")
            })


            // returned valiues are somewhat an array
            $('#myDiv').css("color", "white")
            $('#myDiv').css({"backgroundColor": "red", fontSize: "20px"})
            // innerHTML
            $('div').html("<h3>Jquery is a library to ease development</h3>")

            // textContent or innerText
            $('div').text("<h3>Jquery is a library to ease development</h3>")
            $('div')[0].innerText = "<h3>Jquery is a library to ease development</h3>"


            
        })

    </script>
</body>
</html>
