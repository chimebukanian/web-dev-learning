<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript String Methods</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 24px;
            line-height: 1.6;
        }
        h1 {
            margin-bottom: 8px;
        }
        .example {
            margin-bottom: 18px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: #f9f9f9;
        }
        label,
        button {
            display: block;
            margin: 6px 0;
        }
        button {
            padding: 8px 12px;
            border: 1px solid #333;
            background: #fff;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover {
            background: #f0f0f0;
        }
        #output {
            min-height: 120px;
            padding: 12px;
            border: 1px solid #ddd;
            background: #fff;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>String Methods Demo</h1>
    <p>Use the buttons below to run examples for common JavaScript string methods.</p>

    <div class="example">
        <strong>Example strings:</strong>
        <div id="sampleText">JavaScript is fun</div>
        <button onclick="runExample('charAt')">charAt()</button>
        <button onclick="runExample('concat')">concat()</button>
        <button onclick="runExample('indexOf')">indexOf()</button>
        <button onclick="runExample('lastIndexOf')">lastIndexOf()</button>
        <button onclick="runExample('replace')">replace()</button>
        <button onclick="runExample('search')">search()</button>
        <button onclick="runExample('split')">split()</button>
        <button onclick="runExample('substring')">substring()</button>
        <button onclick="runExample('toLowerCase')">toLowerCase()</button>
        <button onclick="runExample('toUpperCase')">toUpperCase()</button>
    </div>

    <div class="example">
        <h2>Result</h2>
        <div id="output">Click on a button to see the result.</div>
    </div>

    <script>
        const sample = 'JavaScript is fun';

        function runExample(method) {
            let result = '';

            switch (method) {
                case 'charAt':
                    result = `charAt(4) -> ${sample.charAt(4)}`;
                    break;
                case 'concat':
                    result = `concat(' rocks') -> ${sample.concat(' rocks')}`;
                    break;
                case 'indexOf':
                    result = `indexOf('is') -> ${sample.indexOf('is')}`;
                    break;
                case 'lastIndexOf':
                    result = `lastIndexOf('a') -> ${sample.lastIndexOf('a')}`;
                    break;
                case 'replace':
                    result = `replace('fun', 'awesome') -> ${sample.replace('fun', 'awesome')}`;
                    break;
                case 'search':
                    result = `search(/fun/) -> ${sample.search(/fun/)}`;
                    break;
                case 'split':
                    result = `split(' ') -> ${JSON.stringify(sample.split(' '))}`;
                    break;
                case 'substring':
                    result = `substring(0, 10) -> ${sample.substring(0, 10)}`;
                    break;
                case 'toLowerCase':
                    result = `toLowerCase() -> ${sample.toLowerCase()}`;
                    break;
                case 'toUpperCase':
                    result = `toUpperCase() -> ${sample.toUpperCase()}`;
                    break;
                default:
                    result = 'Unknown method';
            }

            document.getElementById('output').textContent = result;
        }
    </script>
</body>
</html>
