<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registration + Mobile Shop</title>
  <style>
    body{font-family: Arial, sans-serif;margin:0;padding:16px;background:#f7f7f7}
    .container{max-width:900px;margin:0 auto;background:#fff;padding:18px;border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    h1{font-size:1.2rem;margin-top:0}
    form .row{display:flex;gap:12px;flex-wrap:wrap}
    label{display:block;margin-bottom:6px;font-weight:600}
    input[type=text],input[type=password],input[type=email]{padding:8px;border:1px solid #ccc;border-radius:4px;width:100%}
    .field{flex:1 1 220px}
    .error{color:#b00020;font-size:0.9rem;margin-top:6px;min-height:1.1em}
    button{background:#0078d4;color:#fff;border:none;padding:10px 14px;border-radius:4px;cursor:pointer}
    .products{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:12px}
    .product{border:1px solid #e0e0e0;padding:10px;border-radius:6px;background:#fafafa;text-align:center}
    .product h3{margin:8px 0 4px;font-size:1rem}
    .product .price{color:#0078d4;font-weight:700}
    #cart{display:flex;align-items:center;gap:8px;justify-content:flex-end}
    #cartModal{position:fixed;right:12px;bottom:12px;background:#fff;border:1px solid #ddd;padding:12px;border-radius:6px;box-shadow:0 6px 18px rgba(0,0,0,.12);max-width:320px}
    @media (max-width:480px){.container{padding:12px}}
  </style>
</head>/
<body>
  <div class="container">
    <h1>Task 1 — Registration Form (JavaScript validation)</h1>
    <form id="regForm" novalidate>
      <div class="row">
        <div class="field">
          <label for="fullName">Full name</label>
          <input id="fullName" name="fullName" type="text" placeholder="Jane Doe">
          <div id="fullNameError" class="error"></div>
        </div>
        <div class="field">
          <label for="mobile">Mobile number</label>
          <input id="mobile" name="mobile" type="text" placeholder="e.g. 0712345678">
          <div id="mobileError" class="error"></div>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com">
          <div id="emailError" class="error"></div>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Min 6 characters">
          <div id="passwordError" class="error"></div>
        </div>
      </div>
      <div style="margin-top:12px">
        <button type="submit">Register</button>
        <span id="regSuccess" style="margin-left:12px;color:green;font-weight:600"></span>
      </div>
    </form>

    <hr style="margin:18px 0">

    <h1>Task 2 — Mobile-friendly Shopping UI (jQuery)</h1>
    <div id="cart" style="margin-bottom:12px">
      <div style="margin-left:auto">Cart: <strong id="cartCount">0</strong>
      <button id="viewCart" style="margin-left:8px">View</button></div>
    </div>

    <div class="products">
      <div class="product" data-name="T-Shirt" data-price="19.99">
        <h3>T-Shirt</h3>
        <div class="price">$19.99</div>
        <button class="add-to-cart" style="margin-top:8px">Add to cart</button>
      </div>
      <div class="product" data-name="Sneakers" data-price="49.95">
        <h3>Sneakers</h3>
        <div class="price">$49.95</div>
        <button class="add-to-cart" style="margin-top:8px">Add to cart</button>
      </div>
      <div class="product" data-name="Cap" data-price="12.50">
        <h3>Cap</h3>
        <div class="price">$12.50</div>
        <button class="add-to-cart" style="margin-top:8px">Add to cart</button>
      </div>
    </div>

    <div id="cartModal" style="display:none">
      <h3>Your Cart</h3>
      <div id="cartItems"></div>
      <div style="margin-top:10px;text-align:right">
        <button id="closeCart">Close</button>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="two_tasks.js"></script>
</body>
</html>
