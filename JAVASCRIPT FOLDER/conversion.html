<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperatures</title>
</head>
<body>
    <p>Invoke (Call) a function to convert from Fahrenheit to to Celsius</p>
    <p id="tem"></p>
    <script>
        function toCelsius(fahrenheit){
            return (5/9) * (fahrenheit-32);
        }

        let Temp = toCelsius(70);
        document.getElementById('tem').innerHTML= 'the result is '+ Temp;
    </script>
</body>
</html>
