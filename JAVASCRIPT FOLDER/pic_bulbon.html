<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bulb and Bell Icon Demo</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: #f0f4ff;
      color: #1d263b;
    }
    .card {
      max-width: 560px;
      margin: 0 auto;
      padding: 24px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      font-size: 2rem;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
    }
    button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #1d4ed8;
      color: white;
      cursor: pointer;
      font-size: 1rem;
    }
    button:hover {
      background: #2563eb;
    }
    .preview {
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .preview img,
    .preview .icon {
      display: block;
      width: 120px;
      height: 120px;
      border-radius: 18px;
      background: #eef2ff;
      border: 2px solid #c7d2fe;
      object-fit: contain;
    }
    .preview .icon {
      font-size: 4rem;
      display: grid;
      place-items: center;
    }
    .hint {
      margin-top: 16px;
      font-size: 0.95rem;
      color: #334155;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Bulb and Bell Icon Demo</h1>
    <p>Use the buttons below to switch the bulb between "on" and "off", and see the bell icon update.</p>

    <div class="controls">
      <button type="button" onclick="turnBulbOn()">Turn Bulb On</button>
      <button type="button" onclick="turnBulbOff()">Turn Bulb Off</button>
      <button type="button" onclick="toggleBell()">Toggle Bell</button>
    </div>

    <div class="preview">
      <img id="bulbImage" src="https://www.w3schools.com/js/pic_bulboff.gif" alt="Bulb off" />
      <div class="icon" id="bellIcon" aria-label="Bell icon">🔕</div>
    </div>

    <p class="hint">The image uses the classic bulb on/off example from w3schools, and the bell icon updates between muted and active states.</p>
  </div>

  <script>
    const bulbImage = document.getElementById('bulbImage');
    const bellIcon = document.getElementById('bellIcon');
    let bellOn = false;

    function turnBulbOn() {
      bulbImage.src = 'https://www.w3schools.com/js/pic_bulbon.gif';
      bulbImage.alt = 'Bulb on';
    }

    function turnBulbOff() {
      bulbImage.src = 'https://www.w3schools.com/js/pic_bulboff.gif';
      bulbImage.alt = 'Bulb off';
    }

    function toggleBell() {
      bellOn = !bellOn;
      bellIcon.textContent = bellOn ? '🔔' : '🔕';
      bellIcon.title = bellOn ? 'Notifications active' : 'Notifications muted';
    }
  </script>
</body>
</html>
