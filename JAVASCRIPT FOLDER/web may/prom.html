<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promise</title>
</head>
<body>
    <h2>JS Promise</h2>

    <div></div>

    <script>
        let myProm = new Promise((resolve, reject) => {
            setTimeout(() => {

                let success = false;

                if (success) {
                resolve('Resolved success!')
                } else {
                    reject('operation failed')
                }
            }, 3000)

        })

        myProm
        .then(
            (val) => {document.querySelector('div').innerHTML = val},
            // (err) =>  {document.querySelector('div').innerHTML = err}
         )
         .catch((err) =>  {document.querySelector('div').innerHTML = err})
         .finally(() => console.log("finally always runs"))

    </script>
</body>
</html>
