<!DOCTYPE html>
<html lang="en" manifest="app.manifest">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
</head>
<body>
   
    <section> <p></p></section
    <div style="border: 2px solid purple; width: 300px; height: 300px" ondrop="dropHndler(event)" ondragover="allowDrop(event)"></div>

    <img src="../workplace.jpg" id="myImg" width="200" height="200" draggable='true' ondragstart="dragStart(event)"/>

    <script>
        let dropHndler = (event) => {

            let imgId = event.dataTransfer.getData('image') //myImg
            let imgElem = document.getElementById(imgId)

            event.target.appendChild(imgElem)
            
        }

        // dragging over
        function allowDrop(event) {
            event.preventDefault() // to prevents refusal to receive draggeed elements
        }

        // drag stasrt
        let dragStart = (event) => {
            event.dataTransfer.setData('image', event.target.id)
        }
    </script>
</body>
</html>
