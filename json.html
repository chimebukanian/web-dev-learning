<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let obj = {name: 'sam', country: 'Nigeria'}
        document.write(obj,'<br>')
        let serializedForm = JSON.stringify(obj)
        document.write(serializedForm, '<br>')

        let deserialized = JSON.parse(serializedForm)
        document.write(deserialized)
    </script>
</body>
</html>
