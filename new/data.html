<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Attribute</title>
    <style>
        /* css comment!!!! */
    [data-name] {
        border: 1px solid yellow;
    }
    </style>
    
</head>
<body>
    <h2>Employee Details</h2>



    <form onsubmit="">
        <label for='uname'>Username: </label>
        <input id="uname">

        <label for="psw">Password: </label>
        <input id="psw">

        <input type="submit">
    </form>
    <!-- ability to create my own attribute: must always start with "data-"" -->
    <div  data-name="Aptech" data-first-name="chimebuka">
        regular div
    </div>
    

    <!-- internal jacascript -->
    <script>
        let employeeArr = [['David', 'New Jersey'], ['John', 'California']]

        for (let i = 0; i < employeeArr.length; i++) {
            for (let j = 0; j < employeeArr[i].length; j++) {
              if (j == 1)  {
                  document.writeln(`Location: ${employeeArr[i][j]} <br>`)
              } else {
                    document.writeln(`Name: ${employeeArr[i][j]} <br>`)
              }
            }
            
        }

        // alert("hello world") this is a comment btw
        document.writeln("Text written from internal javascript")
    </script>


    <!-- External javascript -->
    <script src="function.js"></script>
</body>
</html>
