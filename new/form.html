<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h2>Form</h2>

    <form action="" method="post" novalidate>
        <fieldset>
            <legend>basic details</legend>
        <label for="fname">First Name: </label>
        <input id="fname"  value="naomi" maxlength="7" readonly>
        <br/>
        <br/>
        <label for="lname">Last Name: </label>
        <input id="lname"  required size="39" placeholder="fill last name here..." autofocus>
         <br/>
        <br/>
        <label>phone no:</label>
        <input type="tel" 
            id="phone" 
            name="phone" 
            placeholder="123-45-678" 
            pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}" 
            required><br><br>
        </fieldset>
        <br>
        <label for="browser">enter your fav browser: </label>
        <input id="browser" list="browsers">
        <datalist id="browsers">
            <option value="Edge">
            <option value="Firefox">
            <option value="Chrome">
            <option value="Opera">
            <option value="Safari">
        </datalist>
        <br>
        <p>what's your fav lang</p>
        <input id="html" type="radio" checked name="lang" value="html"> <label for="html">HTML</label>
        <br>
        <input id="css" type="radio" name="lang" value="css"><label for="css">CSS</label>
        <br>
        <input id="js" type="radio" name="lang" value="javascript"><label for="js">JS</label>
        <br>
        <br>
        <label>Cover Letter: </label>
        <br>
        <!-- <textarea rows="10" cols="10"> -->
        <textarea name="message" style="width:200px; height:100px;">
            default text
        </textarea>

        <p>Vehicles owned: </p>
        <input id="jet" type="checkbox" checked name="vehOp1" value="helicopter"> 
        <label for="jet">Helicopter</label>
        <br>
        <input id="car" type="checkbox" name="vehOp2" value="car">
        <label for="car">Car</label>
        <br>
        <input id="boat" type="checkbox" name="lang" name="vehOp3" value="boat">
        <label for="boat">Boat</label>
        <br>
        <input type="button" onclick="alert('you clicked the button')" value="random button">
        <br>
        <br>
        <label for="psw">password: </label>
        <input id="psw" type="password">
        <br>
        <br>
        <label>Fav Color</label>
        <input id="col" type="color" value="#ff0000">

        <br>
        <br>
        <label for="dob">DOB</label>
        <input id="dob" type="datetime-local" >
        

        <br>
        <br>
        <label>date of graduation: </label>
        <input id="date" type="date" min="2001-12-31" max="2020-08-09">
        <br>
        <br>
        <label>Email: </label>
        <input type="email">
        <br>
        <br>
        <label for="file">upload docs</label>
        <input id="file" type="file" multiple>

        <br>
        
  
        <input type="hidden" value="">
        <br>
       <label>Product Quantity: </label>
        <input type="number" min="0" max="9" step="3">
        <br>
        <br>
        <label for="carList">Choose car</label>
        <select id="carList" name="car">
            <option value="Volvo">Volvo</option>
            <option value="lexus">Lexus</option>
            <option value="Mercedes" selected>Mercedes</option>
        </select>
        <br>
        <br>
        <input type="range" >
        <br>
        <input type="submit"> <!--to submit the form-->
        <!-- <input type="image" src="../download.jfif" width="100" height="100"> -->
         <br>
        <label>form completion: </label>
        <progress value="35" max="100"></progress>
            <br>
    </form>
    
    
    <!-- take firstname, lastname, radio favorite food, (4 radio), eductional qualificatrions (primary, sec, technical/vaoctional, tertiary)-->
</body>
</html>
