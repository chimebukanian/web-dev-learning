<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiMedia</title>
</head>
<body>
    <h2>MultiMedia</h2>
    <h3>Video</h3>
    <video width="320" height="240" autoplay loop muted preload="metadata">
        <source src="movie.mp4" type="video/mp4">
        <source src="movie.ogg" type="video/ogg">
        <track src="mysubtitle.vtt" kind="subtitles" srclang="en" label="English" default>
        <track src="mysubtitleFr.vtt" kind="subtitles" srclang="fr" label="French">
        Your browser does not support the video. 
    </video>
    
    <h3>Audio</h3>
    <audio controls loop autoplay muted>
        <source src="horse.mp3" type="audio/mpeg">
        <source src="horse.ogg" type="audio/ogg">
        No Browser support for audio
    </audio>
</body>
</html>
